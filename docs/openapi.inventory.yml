openapi: 3.0.3
info:
  title: Shiatsu Inventory Backend API
  version: 0.1.0
  description: >
    Contract-first API for Month 2 inventory backend.
    All endpoints require Supabase JWT bearer token except /api/health.
servers:
  - url: http://localhost:3001
security:
  - bearerAuth: []
tags:
  - name: Health
  - name: Bodegas
  - name: Productos
  - name: Stock
  - name: Movimientos
paths:
  /api/health:
    get:
      tags: [Health]
      summary: Health check
      security: []
      responses:
        '200':
          description: Service healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /api/bodegas:
    get:
      tags: [Bodegas]
      summary: List bodegas and islas
      responses:
        '200':
          description: Bodegas list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Bodega'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
    post:
      tags: [Bodegas]
      summary: Create bodega/isla
      description: Roles ADMIN and GERENCIA only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BodegaCreateRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Bodega'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /api/bodegas/{id}:
    patch:
      tags: [Bodegas]
      summary: Update bodega/isla
      description: Roles ADMIN and GERENCIA only.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BodegaPatchRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Bodega'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /api/admin/seed/products:
    post:
      tags: [Productos]
      summary: Seed products idempotently by SKU
      description: Roles ADMIN and GERENCIA only. Uses JSON array payload.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              minItems: 1
              items:
                $ref: '#/components/schemas/ProductSeedItem'
      responses:
        '200':
          description: Seed applied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SeedProductsResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '409':
          $ref: '#/components/responses/ConflictError'

  /api/productos:
    get:
      tags: [Productos]
      summary: Search products
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: sku
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Product list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Producto'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /api/stock:
    get:
      tags: [Stock]
      summary: Stock query by bodega_id, sku or producto_id
      parameters:
        - name: bodega_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: sku
          in: query
          required: false
          schema:
            type: string
        - name: producto_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Stock result
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StockItem'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /api/stock/{bodega_id}:
    get:
      tags: [Stock]
      summary: Stock by location
      parameters:
        - name: bodega_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Stock grouped by bodega
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockByBodegaResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /api/movimientos/compra:
    post:
      tags: [Movimientos]
      summary: Register provider purchase (stock ingress)
      description: Roles ADMIN, GERENCIA, BODEGUERO.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompraRequest'
      responses:
        '201':
          description: Purchase movement created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MovimientoResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '409':
          $ref: '#/components/responses/ConflictError'

  /api/movimientos/ajuste:
    post:
      tags: [Movimientos]
      summary: Register audit adjustment
      description: Roles ADMIN and GERENCIA only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AjusteRequest'
      responses:
        '201':
          description: Adjustment movement created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MovimientoResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '409':
          $ref: '#/components/responses/ConflictError'

  /api/movimientos/transferencia:
    post:
      tags: [Movimientos]
      summary: Transfer stock between locations
      description: >
        Planned endpoint in Month 2. If route is exposed before full workflow,
        implementation must return 501 Not Implemented.
      x-planned: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransferenciaRequest'
      responses:
        '501':
          description: Planned for next iteration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/movimientos:
    get:
      tags: [Movimientos]
      summary: Query movements
      parameters:
        - name: tipo
          in: query
          schema:
            $ref: '#/components/schemas/MovimientoTipo'
        - name: bodega_id
          in: query
          schema:
            type: string
            format: uuid
        - name: desde
          in: query
          schema:
            type: string
            format: date-time
        - name: hasta
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Movement list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MovimientoResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /api/movimientos/{id}:
    get:
      tags: [Movimientos]
      summary: Movement detail by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Movement detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MovimientoResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  responses:
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    UnauthorizedError:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    ForbiddenError:
      description: Role not allowed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    ConflictError:
      description: Business conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
  schemas:
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              additionalProperties: true

    HealthResponse:
      type: object
      required: [ok, service, time]
      properties:
        ok:
          type: boolean
          example: true
        service:
          type: string
          example: shiatsu-backend
        time:
          type: string
          format: date-time

    Bodega:
      type: object
      required: [id, nombre, tipo, activo]
      properties:
        id:
          type: string
          format: uuid
        nombre:
          type: string
        tipo:
          type: string
          enum: [BODEGA, ISLA]
        direccion:
          type: string
          nullable: true
        activo:
          type: boolean

    BodegaCreateRequest:
      type: object
      required: [nombre, tipo]
      properties:
        nombre:
          type: string
        tipo:
          type: string
          enum: [BODEGA, ISLA]
        direccion:
          type: string
          nullable: true

    BodegaPatchRequest:
      type: object
      properties:
        nombre:
          type: string
        direccion:
          type: string
          nullable: true
        activo:
          type: boolean

    Producto:
      type: object
      required: [id, sku, nombre, precio_venta, costo_promedio]
      properties:
        id:
          type: string
          format: uuid
        sku:
          type: string
        nombre:
          type: string
        precio_venta:
          type: number
          format: double
        costo_promedio:
          type: number
          format: double

    ProductSeedItem:
      type: object
      required: [sku, nombre, precio_venta]
      properties:
        sku:
          type: string
        nombre:
          type: string
        precio_venta:
          type: number
          format: double
        costo_promedio:
          type: number
          format: double

    SeedProductsResponse:
      type: object
      required: [upserted]
      properties:
        upserted:
          type: integer
          minimum: 0

    StockItem:
      type: object
      required: [bodega_id, producto_id, sku, nombre, cantidad]
      properties:
        bodega_id:
          type: string
          format: uuid
        producto_id:
          type: string
          format: uuid
        sku:
          type: string
        nombre:
          type: string
        cantidad:
          type: integer
          minimum: 0
        stock_minimo:
          type: integer
          nullable: true

    StockByBodegaResponse:
      type: object
      required: [bodega, productos]
      properties:
        bodega:
          $ref: '#/components/schemas/Bodega'
        productos:
          type: array
          items:
            type: object
            required: [producto_id, sku, nombre, cantidad]
            properties:
              producto_id:
                type: string
                format: uuid
              sku:
                type: string
              nombre:
                type: string
              cantidad:
                type: integer
                minimum: 0
              stock_minimo:
                type: integer
                nullable: true

    CompraRequest:
      type: object
      required: [destino_bodega_id, proveedor, nro_documento, items]
      properties:
        destino_bodega_id:
          type: string
          format: uuid
        proveedor:
          type: string
        nro_documento:
          type: string
        items:
          type: array
          minItems: 1
          items:
            type: object
            required: [sku, cantidad, costo_unitario]
            properties:
              sku:
                type: string
              cantidad:
                type: integer
                minimum: 1
              costo_unitario:
                type: number
                format: double
                minimum: 0.0001

    AjusteRequest:
      type: object
      required: [bodega_id, motivo, items]
      properties:
        bodega_id:
          type: string
          format: uuid
        motivo:
          type: string
        items:
          type: array
          minItems: 1
          items:
            type: object
            required: [sku, delta]
            properties:
              sku:
                type: string
              delta:
                type: integer
                description: Non-zero integer; can be positive or negative.

    TransferenciaRequest:
      type: object
      required: [origen_bodega_id, destino_bodega_id, items]
      properties:
        origen_bodega_id:
          type: string
          format: uuid
        destino_bodega_id:
          type: string
          format: uuid
        items:
          type: array
          minItems: 1
          items:
            type: object
            required: [sku, cantidad]
            properties:
              sku:
                type: string
              cantidad:
                type: integer
                minimum: 1

    MovimientoTipo:
      type: string
      enum:
        - COMPRA_PROVEEDOR
        - VENTA_POS
        - TRANSFERENCIA_ENVIADA
        - TRANSFERENCIA_RECIBIDA
        - AJUSTE_AUDITORIA

    MovimientoEstado:
      type: string
      enum: [COMPLETADO, EN_TRANSITO]

    MovimientoDetalle:
      type: object
      required: [id, producto_id, cantidad]
      properties:
        id:
          type: string
          format: uuid
        producto_id:
          type: string
          format: uuid
        cantidad:
          type: integer
          minimum: 1
        delta:
          type: integer
          nullable: true
        costo_unitario:
          type: number
          format: double
          nullable: true

    MovimientoResponse:
      type: object
      required: [id, tipo, usuario_id, fecha, detalles]
      properties:
        id:
          type: string
          format: uuid
        tipo:
          $ref: '#/components/schemas/MovimientoTipo'
        estado:
          allOf:
            - $ref: '#/components/schemas/MovimientoEstado'
          nullable: true
        origen_bodega_id:
          type: string
          format: uuid
          nullable: true
        destino_bodega_id:
          type: string
          format: uuid
          nullable: true
        usuario_id:
          type: string
          format: uuid
        proveedor:
          type: string
          nullable: true
        nro_documento:
          type: string
          nullable: true
        motivo:
          type: string
          nullable: true
        evidencia_url:
          type: string
          nullable: true
        fecha:
          type: string
          format: date-time
        detalles:
          type: array
          items:
            $ref: '#/components/schemas/MovimientoDetalle'